<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1v1 Battle Arena - DSSSB PYQ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600;800&display=swap');

    :root {
        --bg-dark: #0f172a; --bg-card: #1e293b;
        --player1: #3b82f6; --player1-glow: rgba(59, 130, 246, 0.5);
        --player2: #ef4444; --player2-glow: rgba(239, 68, 68, 0.5);
        --text-main: #f8fafc; --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent;}
    body { background: var(--bg-dark); color: var(--text-main); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* --- SCREENS --- */
    .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; inset: 0; background: var(--bg-dark); z-index: 10;}
    .screen.active { display: flex; animation: fadeIn 0.4s ease forwards; }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* --- LOBBY SCREEN --- */
    .lobby { justify-content: center; align-items: center; text-align: center; padding: 20px; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); height: 100%;}
    .arena-title { font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900; background: linear-gradient(to right, var(--player1), var(--player2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(255,255,255,0.1)); margin-bottom: 10px;}
    .play-btn { background: linear-gradient(135deg, var(--player1), #2563eb); color: white; border: none; padding: 18px 40px; font-size: 20px; font-family: 'Orbitron', sans-serif; font-weight: 900; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px var(--player1-glow); transition: 0.2s; margin-top: 40px; text-transform: uppercase; letter-spacing: 2px;}
    .play-btn:active { transform: scale(0.9); }

    /* --- SEARCHING SCREEN --- */
    .searching { justify-content: center; align-items: center; height: 100%; display: flex; flex-direction: column;}
    .radar { width: 150px; height: 150px; border-radius: 50%; background: rgba(59, 130, 246, 0.1); border: 2px solid var(--player1); position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 50px var(--player1-glow);}
    .radar::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--player1); animation: pulseRadar 1.5s infinite; }
    @keyframes pulseRadar { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

    /* --- BATTLE ARENA --- */
    .vs-header { display: flex; height: 80px; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 20; position: relative;}
    
    .player-side { flex: 1; display: flex; align-items: center; padding: 0 15px; position: relative; overflow: hidden;}
    .p1-side { background: linear-gradient(90deg, #1e3a8a, #3b82f6); clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); justify-content: flex-start;}
    .p2-side { background: linear-gradient(270deg, #7f1d1d, #ef4444); clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); justify-content: flex-end; margin-left: -15%;}
    
    .avatar { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; background: var(--bg-dark); display: grid; place-items: center; font-weight: 800; font-size: 18px; z-index: 2;}
    .p-info { display: flex; flex-direction: column; z-index: 2;}
    .p1-side .p-info { margin-left: 10px; }
    .p2-side .p-info { margin-right: 10px; text-align: right;}
    .p-name { font-weight: 800; font-size: 14px; text-transform: uppercase;}
    .p-score { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}

    .vs-badge { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #fbbf24; border-radius: 50%; display: grid; place-items: center; font-family: 'Orbitron', sans-serif; font-weight: 900; color: black; z-index: 30; border: 3px solid var(--bg-dark); box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);}

    /* Timer Bar */
    .timer-container { width: 100%; height: 8px; background: #334155; position: relative;}
    .timer-bar { height: 100%; width: 100%; background: #fbbf24; transition: width 1s linear; box-shadow: 0 0 10px #fbbf24;}
    
    /* Question Area */
    .arena-body { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto;}
    .q-number { font-size: 12px; font-weight: 800; color: #fbbf24; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; text-align: center;}
    .q-text { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 30px; line-height: 1.4; padding: 0 10px;}

    .options-grid { display: flex; flex-direction: column; gap: 15px; }
    .opt-btn { background: var(--bg-card); border: 2px solid #334155; padding: 16px 20px; border-radius: 12px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; text-align: left; display: flex; align-items: center;}
    
    .opt-btn:active { transform: scale(0.98); }
    .opt-btn.selected { border-color: var(--player1); background: rgba(59, 130, 246, 0.2); }
    .opt-btn.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: #34d399; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);}
    .opt-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: #f87171;}
    .opt-btn.disabled { pointer-events: none; opacity: 0.7;}

    /* Opponent Action Indicator */
    .opponent-action { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.9); padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; display: none; animation: popUp 0.3s forwards; box-shadow: 0 5px 15px var(--player2-glow); z-index: 100;}
    @keyframes popUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

    /* --- RESULT SCREEN --- */
    .result { justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #1e293b, #0f172a); height: 100%; display: flex; flex-direction: column;}
    .res-status { font-family: 'Orbitron', sans-serif; font-size: 40px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase;}
    .win-text { color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
    .lose-text { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    .draw-text { color: #94a3b8; }
    
    .final-scores { display: flex; gap: 30px; margin-bottom: 40px;}
    .f-score-box { background: var(--bg-card); padding: 20px 30px; border-radius: 20px; border: 2px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3);}
    .f-score-box.winner { border-color: #fbbf24; box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);}
    .f-score-val { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900;}

    .home-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none;}
</style>
</head>
<body>

<div class="screen active" id="s-lobby">
    <div class="lobby">
        <div style="font-size: 60px; margin-bottom: 10px;">⚔️</div>
        <div class="arena-title">BATTLE ARENA</div>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Challenge opponents in real-time. Faster answers give more points!</p>
        
        <div style="background: var(--bg-card); padding: 15px 30px; border-radius: 15px; border: 1px solid #334155; display: inline-block;">
            <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">Your Rating</div>
            <div style="font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; color: #fbbf24;">1250 <i class="fas fa-trophy" style="font-size:18px;"></i></div>
        </div>

        <button class="play-btn" onclick="startSearch()"><i class="fas fa-play"></i> Play vs AI Bot</button>
        <div style="margin-top: 30px;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: bold;">Exit Arena</a>
        </div>
    </div>
</div>

<div class="screen" id="s-search">
    <div class="searching">
        <div class="radar">
            <i class="fas fa-crosshairs" style="font-size: 40px; color: var(--player1);"></i>
        </div>
        <h2 style="margin-top: 40px; font-family: 'Orbitron', sans-serif; letter-spacing: 1px;">SCANNING...</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">Finding a worthy opponent</p>
    </div>
</div>

<div class="screen" id="s-arena">
    <div class="vs-header">
        <div class="player-side p1-side">
            <div class="avatar" style="color:var(--player1);">You</div>
            <div class="p-info">
                <div class="p-name">You</div>
                <div class="p-score" id="myScore">0</div>
            </div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="player-side p2-side">
            <div class="p-info">
                <div class="p-name">ProBot</div>
                <div class="p-score" id="opScore">0</div>
            </div>
            <div class="avatar" style="color:var(--player2);">🤖</div>
        </div>
    </div>
    
    <div class="timer-container"><div class="timer-bar" id="timerBar"></div></div>

    <div class="arena-body">
        <div class="q-number" id="qNum">Question 1 / 5</div>
        <div class="q-text" id="qText">Loading question...</div>
        
        <div class="options-grid" id="optionsBox">
            </div>
    </div>

    <div class="opponent-action" id="opAction">🤖 ProBot answered!</div>
</div>

<div class="screen" id="s-result">
    <div class="result">
        <div id="resIcon" style="font-size: 80px; margin-bottom: 20px;">🏆</div>
        <div class="res-status win-text" id="resStatus">VICTORY!</div>
        
        <div class="final-scores">
            <div class="f-score-box" id="myFinalBox">
                <div style="font-size:12px; color:var(--text-muted); font-weight:bold; margin-bottom:5px;">YOU</div>
                <div class="f-score-val" style="color:var(--player1);" id="myFinalScore">0</div>
            </div>
            <div class="f-score-box" id="opFinalBox">
                <div style="font-size:12px; color:var(--text-muted); font-weight:bold; margin-bottom:5px;">PROBOT</div>
                <div class="f-score-val" style="color:var(--player2);" id="opFinalScore">0</div>
            </div>
        </div>

        <button class="play-btn" style="margin-top:0; padding:15px 30px; font-size:16px;" onclick="location.reload()">Play Again</button>
        <div style="margin-top: 30px;">
            <a href="index.html" class="home-btn">Back to Dashboard</a>
        </div>
    </div>
</div>

<script>
    // --- SMART QUESTION FETCHER LOGIC ---
    let questions = [];
    
    // Attempt to load real questions from LocalStorage (saved from cbt.html)
    try {
        let qsRaw = localStorage.getItem('dsssb_replay_qs');
        if(qsRaw) {
            let realQs = JSON.parse(qsRaw);
            // Shuffle all questions and pick 5 random ones for battle
            realQs = realQs.sort(() => Math.random() - 0.5).slice(0, 5);
            
            questions = realQs.map(q => {
                return {
                    q: q.q_en || q.q_hi,
                    opt: q.op_en || q.op_hi,
                    ans: parseInt(q.ans) - 1 // Convert 1-based to 0-based index
                };
            });
        }
    } catch(e) {
        console.error("Failed to load real questions for battle", e);
    }

    // Fallback Backup Questions (If local storage is empty)
    if (questions.length === 0) {
        questions = [
            { q: "What is the square of 15?", opt: ["225", "125", "250", "150"], ans: 0 },
            { q: "What is a synonym for 'Abundant'?", opt: ["Scarce", "Plentiful", "Rare", "Deficient"], ans: 1 },
            { q: "Which article relates to Equality before law?", opt: ["19", "14", "21", "32"], ans: 1 },
            { q: "If A=1, B=2, what is CAT?", opt: ["24", "22", "20", "26"], ans: 0 },
            { q: "The HCF of 12 and 16 is?", opt: ["2", "4", "6", "8"], ans: 1 }
        ];
    }

    // --- BATTLE VARIABLES ---
    let currentQ = 0;
    let myScore = 0;
    let opScore = 0;
    let timerInt;
    let botInt;
    let timeLeft = 10; // 10 seconds per question
    const maxTime = 10;
    let hasAnswered = false;

    function startSearch() {
        document.getElementById('s-lobby').classList.remove('active');
        document.getElementById('s-search').classList.add('active');
        
        // Fake matchmaking delay
        setTimeout(() => {
            document.getElementById('s-search').classList.remove('active');
            document.getElementById('s-arena').classList.add('active');
            loadQuestion();
        }, 2500);
    }

    function loadQuestion() {
        if (currentQ >= questions.length) {
            endGame();
            return;
        }

        hasAnswered = false;
        timeLeft = maxTime;
        document.getElementById('timerBar').style.width = '100%';
        document.getElementById('opAction').style.display = 'none';

        const qData = questions[currentQ];
        document.getElementById('qNum').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        document.getElementById('qText').innerHTML = qData.q;

        let optHtml = '';
        qData.opt.forEach((o, i) => {
            optHtml += `<div class="opt-btn" onclick="checkAnswer(this, ${i}, ${qData.ans})"><b>${String.fromCharCode(65+i)}</b>. &nbsp; ${o}</div>`;
        });
        document.getElementById('optionsBox').innerHTML = optHtml;

        startTimer();
        simulateBot();
    }

    function startTimer() {
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            timeLeft--;
            let pct = (timeLeft / maxTime) * 100;
            document.getElementById('timerBar').style.width = pct + '%';
            
            if (timeLeft <= 0) {
                clearInterval(timerInt);
                if (!hasAnswered) handleTimeOut();
            }
        }, 1000);
    }

    function checkAnswer(btn, selectedIdx, correctIdx) {
        if (hasAnswered) return;
        hasAnswered = true;
        clearInterval(timerInt);

        // Disable buttons
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.add('disabled'));

        btn.classList.add('selected');

        // Score logic: 10 base points + time bonus
        if (selectedIdx === correctIdx) {
            btn.classList.add('correct');
            let points = 10 + (timeLeft * 2);
            myScore += points;
            animateScore('myScore', myScore);
        } else {
            btn.classList.add('wrong');
            btns[correctIdx].classList.add('correct'); 
        }

        setTimeout(() => {
            currentQ++;
            loadQuestion();
        }, 2000);
    }

    function handleTimeOut() {
        hasAnswered = true;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.add('disabled'));
        btns[questions[currentQ].ans].classList.add('correct');
        
        setTimeout(() => { currentQ++; loadQuestion(); }, 2000);
    }

    function simulateBot() {
        clearTimeout(botInt);
        // Bot random answer time 2 to 6 seconds
        let botDelay = Math.floor(Math.random() * 4000) + 2000;
        
        botInt = setTimeout(() => {
            if(timeLeft <= 0) return;
            
            const opToast = document.getElementById('opAction');
            opToast.style.display = 'block';

            // Bot accuracy ~ 70%
            let isBotCorrect = Math.random() > 0.3;
            if (isBotCorrect) {
                let botPoints = 10 + (timeLeft * 2); 
                opScore += botPoints;
                animateScore('opScore', opScore);
            }
        }, botDelay);
    }

    function animateScore(id, newScore) {
        const el = document.getElementById(id);
        el.innerText = newScore;
        el.style.transform = "scale(1.5)";
        el.style.color = "white";
        setTimeout(() => {
            el.style.transform = "scale(1)";
            el.style.color = "";
        }, 300);
    }

    function endGame() {
        document.getElementById('s-arena').classList.remove('active');
        document.getElementById('s-result').classList.add('active');

        document.getElementById('myFinalScore').innerText = myScore;
        document.getElementById('opFinalScore').innerText = opScore;

        const resStatus = document.getElementById('resStatus');
        const resIcon = document.getElementById('resIcon');

        if (myScore > opScore) {
            resStatus.innerText = "VICTORY!";
            resStatus.className = "res-status win-text";
            resIcon.innerText = "🏆";
            document.getElementById('myFinalBox').classList.add('winner');
            if(window.confetti) confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        } else if (opScore > myScore) {
            resStatus.innerText = "DEFEAT";
            resStatus.className = "res-status lose-text";
            resIcon.innerText = "💀";
            document.getElementById('opFinalBox').classList.add('winner');
        } else {
            resStatus.innerText = "DRAW!";
            resStatus.className = "res-status draw-text";
            resIcon.innerText = "🤝";
        }
    }
</script>
</body>
</html>
